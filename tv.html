<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>現場叫號顯示螢幕</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background-color: #00B900;
            padding: 20px;
            text-align: center;
            font-size: 2.5rem;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .content-area {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
        }

        .ready-panel {
            flex: 2;
            background-color: #2c2c2c;
            border-radius: 15px;
            border: 4px solid #00B900;
            display: flex;
            flex-direction: column;
        }

        .preparing-panel {
            flex: 1;
            background-color: #2c2c2c;
            border-radius: 15px;
            border: 4px solid #555;
            display: flex;
            flex-direction: column;
        }

        .panel-title {
            text-align: center;
            font-size: 3rem;
            font-weight: bold;
            padding: 15px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        .ready-panel .panel-title {
            background-color: rgba(0, 185, 0, 0.2);
            color: #00ff00;
        }

        .preparing-panel .panel-title {
            background-color: rgba(255, 255, 255, 0.05);
            color: #ccc;
        }

        .numbers-grid {
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            padding: 20px;
            gap: 20px;
            overflow-y: auto;
            flex: 1;
        }

        .number-box {
            background-color: #333;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            font-size: 4.5rem;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            flex: 1 1 30%;
            min-width: 200px;
            transition: all 0.3s;
        }

        .ready-panel .number-box {
            background-color: #1B5E20;
            border: 2px solid #4CAF50;
            color: #ffffff;
            animation: pulse 2s infinite;
        }

        .preparing-panel .number-box {
            background-color: #424242;
            color: #9e9e9e;
            font-size: 3rem;
            min-width: 150px;
        }

        .new-call {
            background-color: #ffff00 !important;
            color: #000000 !important;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.03);
            }

            100% {
                transform: scale(1);
            }
        }

        /* Hide scrollbar */
        ::-webkit-scrollbar {
            width: 0;
            background: transparent;
        }
    </style>
</head>

<body>

    <div class="header">
        <div style="font-size:1rem; cursor:pointer;" onclick="toggleFullScreen()">⛶ 全螢幕</div>
        <div>請 依 號 碼 取 餐</div>
        <div style="font-size:1.5rem;" id="clock">12:00:00</div>
    </div>

    <div class="content-area">
        <!-- Ready Section -->
        <div class="ready-panel">
            <div class="panel-title">✅ 請取餐 READY</div>
            <div class="numbers-grid" id="readyList">
                <!-- Numbers injected here -->
                <h3 class="text-secondary w-100 text-center mt-5">載入中...</h3>
            </div>
        </div>

        <!-- Preparing Section -->
        <div class="preparing-panel">
            <div class="panel-title">⏳ 準備中 PREP</div>
            <div class="numbers-grid" id="preparingList">
                <!-- Numbers injected here -->
            </div>
        </div>
    </div>

    <audio id="chime" src="https://assets.mixkit.co/sfx/preview/mixkit-clear-announce-tones-2861.mp3"></audio>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzG5aSsxvduJRoww4ZZ9XNFpMEVRL93ThZNJXLQld3koAJCYqp5pecSuHARVxl13O0fSQ/exec";
        let lastReadyIds = [];

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('zh-TW');
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function fetchScreenData() {
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'admin_data', payload: { type: 'active' } })
                });
                const rs = await res.json();
                if (rs.success) {
                    renderScreen(rs.orders || []);
                }
            } catch (e) {
                console.error("Fetch error", e);
            }
        }

        function renderScreen(orders) {
            const ready = orders.filter(o => o.order_status === 'ready');
            const preparing = orders.filter(o => o.order_status === 'accepted' || o.order_status === 'preparing');

            let newCall = false;
            let currentReadyIds = ready.map(o => o.order_id);

            // Check if there's a new ready order to play sound
            currentReadyIds.forEach(id => {
                if (!lastReadyIds.includes(id)) {
                    newCall = true;
                }
            });
            if (newCall && lastReadyIds.length > 0) {
                try {
                    document.getElementById('chime').play().catch(e => { });
                } catch (e) { }
            }
            lastReadyIds = currentReadyIds;

            const extractNo = (order_no) => order_no.substring(order_no.length - 4);

            document.getElementById('readyList').innerHTML = ready.length > 0
                ? ready.map(o => `<div class="number-box">${extractNo(o.order_no)}</div>`).join('')
                : '<div class="w-100 text-center text-muted mt-5" style="font-size:2rem;">目前無待取餐</div>';

            document.getElementById('preparingList').innerHTML = preparing.length > 0
                ? preparing.map(o => `<div class="number-box">${extractNo(o.order_no)}</div>`).join('')
                : '<div class="w-100 text-center text-muted mt-5">目前無訂單</div>';
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert(`Error: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // Fetch data every 5 seconds
        setInterval(fetchScreenData, 5000);
        fetchScreenData();
    </script>
</body>

</html>
